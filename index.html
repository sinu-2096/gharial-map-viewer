<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

<script src="config.js"></script>
<script src="markers.js"></script>
<script src="analytics.js"></script>
<script src="heatmap.js"></script>
<script src="survival.js"></script>
<script src="corridors.js"></script>
<script src="updates.js"></script>
<script src="dashboard.js"></script>
</head>

<body>

<header>

<img src="unnamed.png" class="logo-left">

<h1>Pali FT Hatchlings Telemetry Dashboard</h1>

<img src="image.png" class="logo-right">

</header>
<div class="controls">

<select id="animalFilter">
<option value="all">All Hatchlings</option>
</select>

<div class="hint">
Select hatchling to view movement track
</div>

<div class="telemetry-status">
<span class="dot"></span>
<span id="statusText">Loading telemetry...</span>
</div>

<button onclick="openUpdates()">Field Updates</button>

</div>

<div id="movementPanel"></div>

<div id="map"></div>

<div id="analyticsPanel"></div>

<div id="survivalPanel"></div>

<table id="dataTable">
<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
<th>Lat</th>
<th>Lon</th>
<th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="updatesPanel">
<button onclick="closeUpdates()">Close</button>
<div id="updatesContent"></div>
</div>

</body>
</html>
