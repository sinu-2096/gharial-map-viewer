<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:10px 20px;
display:flex;
align-items:center;
gap:15px;
}

header img{
height:40px;
}

header h1{
flex:1;
text-align:center;
font-size:20px;
margin:0;
}

.top-panel{
background:white;
padding:10px 20px;
border-bottom:1px solid #ccc;
display:flex;
align-items:center;
gap:20px;
}

.map-container{
height:70vh;
}

#map{
height:100%;
width:100%;
}

.table-container{
background:white;
padding:20px;
}

.telemetry-table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.telemetry-table th,
.telemetry-table td{
padding:8px 10px;
border-bottom:1px solid #ddd;
}

.telemetry-table th{
background:#2c3e50;
color:white;
}

.animal-marker{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
border:2px solid white;
box-shadow:0 0 4px rgba(0,0,0,0.5);
}

.marker-blue{
background:#007bff;
}

.marker-red{
background:#dc3545;
}

.field-panel{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:right 0.3s;
overflow:auto;
}

.field-panel.open{
right:0;
}

.close-btn{
cursor:pointer;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<img src="image.png">
<img src="unnamed.png">
<h1>Pali FT Hatchlings Telemetry Dashboard</h1>
</header>

<div class="top-panel">

<label>Select Animal</label>

<select id="animalFilter">
<option value="all">All Animals</option>
</select>

<button onclick="toggleFieldPanel()">Field Updates</button>

<div id="statusBar">Latest Telemetry: loading...</div>

</div>

<div class="map-container">
<div id="map"></div>
</div>

<div class="table-container">

<table class="telemetry-table" id="dataTable">

<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal Strength</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Remarks</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="field-panel" id="fieldPanel">

<div style="display:flex;justify-content:space-between;">
<h3>Field Updates</h3>
<div class="close-btn" onclick="toggleFieldPanel()">✕</div>
</div>

<div id="fieldUpdatesList"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const CSV_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0';

const UPDATE_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=238985281';

const DEAD_IDS=['30','33','34','38','96','64','98'];

let map;
let rawData=[];
let animalsData={};
let markers=[];

function init(){

map=L.map('map').setView([25.84,76.56],13);

L.tileLayer(
'http://mt0.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);

loadTelemetry();
loadFieldUpdates();

document.getElementById("animalFilter")
.addEventListener("change",e=>renderMap(e.target.value));

}

function loadTelemetry(){

Papa.parse(CSV_URL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

rawData=results.data;

processData();
populateDropdown();
renderMap("all");
renderTable("all");
updateStatus();

}
});

}

function processData(){

animalsData={};

rawData.forEach(row=>{

let id=row["Animal ID"];

if(!id) return;

if(!animalsData[id]) animalsData[id]=[];

animalsData[id].push(row);

});

}

function populateDropdown(){

let select=document.getElementById("animalFilter");

Object.keys(animalsData).sort((a,b)=>a-b).forEach(id=>{

let option=document.createElement("option");

option.value=id;
option.textContent=id;

select.appendChild(option);

});

}

function renderMap(selected){

markers.forEach(m=>map.removeLayer(m));

markers=[];

let data=[];

if(selected==="all"){

Object.values(animalsData).forEach(arr=>data.push(arr[0]));

}else{

data=animalsData[selected]||[];

}

data.forEach(r=>{

let lat=parseFloat(r.Latitude);
let lng=parseFloat(r.Longitude);

if(isNaN(lat)||isNaN(lng)) return;

let id=r["Animal ID"];

let color=DEAD_IDS.includes(id)?"marker-red":"marker-blue";

let icon=L.divIcon({
className:"animal-marker "+color,
html:id
});

let marker=L.marker([lat,lng],{icon}).addTo(map);

marker.bindPopup(

"<b>Animal ID:</b> "+r["Animal ID"]+
"<br><b>Timestamp:</b> "+r["Timestamp"]+
"<br><b>Place:</b> "+r["Place"]+
"<br><b>Activity:</b> "+r["Activity"]+
"<br><b>Signal Strength:</b> "+(r["Signal Stength"]||"")+
"<br><b>Latitude:</b> "+r["Latitude"]+
"<br><b>Longitude:</b> "+r["Longitude"]+
"<br><b>Remarks:</b> "+(r["Remarks"]||"")

);

markers.push(marker);

});

}

function renderTable(selected){

let tbody=document.querySelector("#dataTable tbody");

tbody.innerHTML="";

let data=[];

if(selected==="all"){

Object.values(animalsData).forEach(arr=>data.push(arr[0]));

}else{

data=animalsData[selected]||[];

}

data.forEach(r=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${r["Animal ID"]}</td>
<td>${r["Timestamp"]}</td>
<td>${r["Place"]}</td>
<td>${r["Activity"]}</td>
<td>${r["Signal Stength"]||""}</td>
<td>${r["Latitude"]}</td>
<td>${r["Longitude"]}</td>
<td>${r["Remarks"]||""}</td>
`;

tbody.appendChild(tr);

});

}

function updateStatus(){

let latest=rawData
.map(r=>r.Timestamp)
.sort()
.reverse()[0];

document.getElementById("statusBar").innerText=
"Latest Telemetry: "+latest;

}

function loadFieldUpdates(){

Papa.parse(UPDATE_URL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

let container=document.getElementById("fieldUpdatesList");

results.data.reverse().forEach(r=>{

if(!r.Date) return;

let div=document.createElement("div");

div.innerHTML="<b>"+r.Date+"</b><br>"+r.Update;

container.appendChild(div);

});

}
});

}

function toggleFieldPanel(){

document.getElementById("fieldPanel").classList.toggle("open");

}

document.addEventListener("DOMContentLoaded",init);

</script>

</body>
</html>
