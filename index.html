<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0b0b;
color:white;
}

header{
display:flex;
align-items:center;
justify-content:center;
padding:10px;
background:#111;
position:relative;
}

.logo-group{
position:absolute;
left:10px;
display:flex;
gap:10px;
align-items:center;
}

.logo-group img{
height:42px;
width:auto;
}

h1{
font-size:20px;
margin:0;
text-align:center;
}

#controls{
padding:8px;
background:#161616;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

select{
padding:6px;
font-size:14px;
}

#analytics{
padding:10px;
background:#141414;
border-bottom:1px solid #333;
display:none;
}

#map{
height:70vh;
}

#tableContainer{
height:200px;
overflow:auto;
background:#0f0f0f;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #333;
text-align:left;
}

tr:hover{
background:#1d1d1d;
cursor:pointer;
}

#fieldUpdatesBtn{
position:absolute;
top:10px;
right:10px;
background:#222;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
}

#fieldPanel{
position:absolute;
right:10px;
top:50px;
background:#111;
padding:10px;
border:1px solid #333;
display:none;
max-width:300px;
}

.marker-label{
color:white;
font-weight:bold;
text-shadow:0 0 4px black;
}

</style>
</head>

<body>

<header>

<div class="logo-group">
<img src="image.png" onerror="this.style.display='none'">
<img src="unnamed.png" onerror="this.style.display='none'">
</div>

<h1>Pali FT Hatchlings Telemetry Dashboard</h1>

<button id="fieldUpdatesBtn">Field Updates</button>

<div id="fieldPanel">
<div id="fieldContent">Loading...</div>
</div>

</header>

<div id="controls">

<label>Filter Animal ID:</label>
<select id="animalFilter">
<option value="all">All</option>
</select>

</div>

<div id="analytics"></div>

<div id="map"></div>

<div id="tableContainer">
<table id="dataTable">
<thead>
<tr>
<th>ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
<th>Lat</th>
<th>Lng</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/overlapping-marker-spiderfier-leaflet/0.2.6/oms.min.js"></script>

<script>

const TELEMETRY_URL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0"
const FIELD_URL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=238985281"

let map=L.map("map").setView([25.84,76.56],13)

L.tileLayer("https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",{
maxZoom:20,
subdomains:["mt0","mt1","mt2","mt3"]
}).addTo(map)

let oms=new OverlappingMarkerSpiderfier(map)

let markers=[]
let tracks={}
let data=[]

function parseCSV(text){
let rows=text.trim().split("\n")
return rows.map(r=>r.split(","))
}

function haversine(lat1,lon1,lat2,lon2){

const R=6371000

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c
}

function createLabelIcon(id){

return L.divIcon({
className:"",
html:`<div class="marker-label">${id}</div>`
})

}

async function loadTelemetry(){

let res=await fetch(TELEMETRY_URL)
let text=await res.text()

let rows=parseCSV(text)

rows.shift()

rows.forEach(r=>{

let obj={
id:r[0],
time:r[1],
place:r[2],
activity:r[3],
signal:r[4],
lat:parseFloat(r[5]),
lng:parseFloat(r[6]),
remarks:r[7]
}

if(!isNaN(obj.lat)&&!isNaN(obj.lng)) data.push(obj)

})

populateFilter()
drawData()

}

function populateFilter(){

let ids=[...new Set(data.map(d=>d.id))]

let sel=document.getElementById("animalFilter")

ids.forEach(id=>{
let o=document.createElement("option")
o.value=id
o.text=id
sel.appendChild(o)
})

}

function clearMap(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

Object.values(tracks).forEach(t=>map.removeLayer(t))
tracks={}

}

function drawData(){

clearMap()

let filter=document.getElementById("animalFilter").value

let filtered=data.filter(d=>filter==="all"||d.id===filter)

let tbody=document.querySelector("#dataTable tbody")
tbody.innerHTML=""

filtered.forEach((d,i)=>{

let marker=L.marker([d.lat,d.lng],{icon:createLabelIcon(d.id)}).addTo(map)

marker.bindPopup(`
<b>ID:</b> ${d.id}<br>
<b>Time:</b> ${d.time}<br>
<b>Place:</b> ${d.place}<br>
<b>Activity:</b> ${d.activity}<br>
<b>Signal:</b> ${d.signal}<br>
<b>Remarks:</b> ${d.remarks}
`)

oms.addMarker(marker)

markers.push(marker)

let row=document.createElement("tr")

row.innerHTML=`
<td>${d.id}</td>
<td>${d.time}</td>
<td>${d.place}</td>
<td>${d.activity}</td>
<td>${d.signal}</td>
<td>${d.lat}</td>
<td>${d.lng}</td>
`

row.onclick=()=>{
map.setView([d.lat,d.lng],16)
marker.openPopup()
}

tbody.appendChild(row)

})

if(filter!=="all"){

let animal=data.filter(d=>d.id===filter)

animal.sort((a,b)=>new Date(a.time)-new Date(b.time))

let coords=animal.map(d=>[d.lat,d.lng])

let line=L.polyline(coords,{color:"yellow"}).addTo(map)

tracks[filter]=line

showAnalytics(animal)

let release=animal[0]

let star=L.marker([release.lat,release.lng],{
icon:L.divIcon({
html:"⭐",
className:"",
iconSize:[20,20]
})
}).addTo(map)

markers.push(star)

}else{

document.getElementById("analytics").style.display="none"

}

}

function showAnalytics(animal){

let release=animal[0]

let latest=animal[animal.length-1]

let prev=animal[animal.length-2]||latest

let max=0

animal.forEach(p=>{
let d=haversine(release.lat,release.lng,p.lat,p.lng)
if(d>max) max=d
})

let current=haversine(release.lat,release.lng,latest.lat,latest.lng)

let prevMove=haversine(prev.lat,prev.lng,latest.lat,latest.lng)

let div=document.getElementById("analytics")

div.style.display="block"

div.innerHTML=`
<b>Movement Analytics — ID ${release.id}</b><br><br>
Maximum displacement from release: ${max.toFixed(0)} m<br>
Current distance from release: ${current.toFixed(0)} m<br>
Distance from previous fix: ${prevMove.toFixed(0)} m
`

}

document.getElementById("animalFilter").onchange=drawData

async function loadFieldUpdates(){

let res=await fetch(FIELD_URL)
let text=await res.text()

let rows=parseCSV(text)

rows.shift()

let latest=null

rows.forEach(r=>{

let date=r[0]
let update=r[1]

if(!date||!update) return

let parts=date.split("-")
let d=new Date(parts[2],parts[1]-1,parts[0])

if(!latest||d>latest.date){

latest={date:d,text:update,raw:date}

}

})

let content=document.getElementById("fieldContent")

if(latest){

content.innerHTML=`
<b>Field Update</b><br><br>
${latest.raw} — ${latest.text}
`

}else{

content.innerHTML="No updates."

}

}

document.getElementById("fieldUpdatesBtn").onclick=()=>{

let p=document.getElementById("fieldPanel")

p.style.display=p.style.display==="none"?"block":"none"

}

loadTelemetry()
loadFieldUpdates()

</script>

</body>
</html>
