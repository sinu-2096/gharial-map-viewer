<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

<style>
:root {
  --map-height: 65vh;
  --primary-bg: #f4f6f9;
  --header-bg: #2c3e50;
  --text-color: #333;
  --border-color: #ccc;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--primary-bg);
  color: var(--text-color);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: center;
  background: var(--header-bg);
  color: white;
  padding: 10px 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.header-logos {
  display: flex;
  align-items: center;
  gap: 15px;
  flex-shrink: 0;
}

.header-logo {
  height: 50px;
  width: auto;
  object-fit: contain;
}

header h1 {
  flex-grow: 1;
  text-align: center;
  font-size: 1.5rem;
  margin-right: 130px; /* Offset to keep title centered relative to logos */
}

.top-panel {
  background: white;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-group label {
  font-weight: bold;
  color: var(--header-bg);
}

.filter-group select {
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
}

.status-indicator {
  font-size: 0.9rem;
  font-weight: bold;
  color: #2c3e50;
  background: #ecf0f1;
  padding: 5px 12px;
  border-radius: 4px;
}

.field-update-box {
  background: #fff3cd;
  border: 1px solid #ffeeba;
  padding: 10px 20px;
  font-size: 0.95rem;
  color: #856404;
}

.analytics-panel {
  display: none;
  background: #e8f4fd;
  border-bottom: 2px solid #3498db;
  padding: 15px 20px;
}

.analytics-grid {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.analytics-item b {
  color: #2980b9;
}

.map-container {
  height: var(--map-height);
  width: 100%;
}

#map {
  width: 100%;
  height: 100%;
}

.table-container {
  padding: 20px;
  background: white;
  overflow-x: auto;
}

.telemetry-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

.telemetry-table th, .telemetry-table td {
  padding: 10px;
  text-align: left;
  border-bottom: 1px solid #eee;
}

.telemetry-table th {
  background: var(--header-bg);
  color: white;
  position: sticky;
  top: 0;
}

.telemetry-table tr:hover {
  background: #f1f1f1;
  cursor: pointer;
}

.animal-marker {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 11px;
  border: 2px solid white;
  box-shadow: 0 0 4px rgba(0,0,0,0.5);
}

.marker-default { background: #3498db; }
.marker-selected { background: #e74c3c; }

@media (max-width: 768px) {
  header h1 { margin-right: 0; font-size: 1.1rem; }
  .header-logo { height: 35px; }
}
</style>
</head>

<body>

<header>
  <div class="header-logos">
    <img src="image.png" alt="" class="header-logo" onerror="this.style.display='none'">
    <img src="unnamed.png" alt="" class="header-logo" onerror="this.style.display='none'">
  </div>
  <h1>Pali FT Hatchlings Telemetry Dashboard</h1>
</header>

<div class="field-update-box" id="fieldUpdateStrip">
  <b>Latest Field Update:</b> <span id="latestUpdateText">Loading...</span>
</div>

<div class="top-panel">
  <div class="filter-group">
    <label for="animalFilter">Animal ID</label>
    <select id="animalFilter">
      <option value="all">All Animals</option>
    </select>
  </div>
  <div class="status-indicator" id="statusIndicator">Latest Telemetry: --</div>
</div>

<div class="analytics-panel" id="analyticsPanel">
  <h3 id="analyticsTitle" style="margin-bottom:10px; color:#2c3e50;">Movement Analytics</h3>
  <div class="analytics-grid">
    <div class="analytics-item">Maximum displacement from release: <b id="statMax">--</b> m</div>
    <div class="analytics-item">Current distance from release: <b id="statCurrent">--</b> m</div>
    <div class="analytics-item">Distance from previous fix: <b id="statPrev">--</b> m</div>
  </div>
</div>

<div class="map-container">
  <div id="map"></div>
</div>

<div class="table-container">
  <table class="telemetry-table" id="dataTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Timestamp</th>
        <th>Place</th>
        <th>Activity</th>
        <th>Signal</th>
        <th>Lat</th>
        <th>Lon</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const SPREADSHEET_ID = '10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ';
const TELEMETRY_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
const UPDATES_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=1114513813`; // GID for Sheet2

let map, oms;
let trackLayer = L.featureGroup();
let markerLayer = L.featureGroup();
let animalsData = {};
let latestRecords = {};
let markersMap = {};

function init() {
  map = L.map('map').setView([25.84, 76.56], 13);
  L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    attribution: 'Map data © Google'
  }).addTo(map);

  oms = new OverlappingMarkerSpiderfier(map, {
    keepSpiderfied: true,
    nearbyDistance: 20
  });

  trackLayer.addTo(map);
  markerLayer.addTo(map);

  loadData();
  loadUpdates();

  document.getElementById('animalFilter').addEventListener('change', (e) => {
    updateView(e.target.value);
  });
}

function loadData() {
  Papa.parse(TELEMETRY_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      processTelemetry(results.data);
    }
  });
}

function loadUpdates() {
  Papa.parse(UPDATES_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      const data = results.data;
      if (data.length > 0) {
        // Find latest based on row order (assuming appended)
        const latest = data[data.length - 1];
        document.getElementById('latestUpdateText').innerText = `${latest.Date} — ${latest.Update}`;
      }
    }
  });
}

function processTelemetry(data) {
  animalsData = {};
  let globalLatest = new Date(0);
  let globalLatestStr = "";

  data.forEach(row => {
    const id = row['Animal ID'];
    if (!id) return;
    
    if (!animalsData[id]) animalsData[id] = [];
    
    // Simple date parsing dd-mm-yyyy hh:mm
    const pts = row['Timestamp'].split(' ');
    const dpts = pts[0].split('-');
    const tpts = pts[1] ? pts[1].split(':') : ["00","00"];
    row.parsedDate = new Date(dpts[2], dpts[1]-1, dpts[0], tpts[0], tpts[1]);
    
    animalsData[id].push(row);

    if (row.parsedDate > globalLatest) {
      globalLatest = row.parsedDate;
      globalLatestStr = row['Timestamp'];
    }
  });

  document.getElementById('statusIndicator').innerText = `Latest Telemetry: ${globalLatestStr}`;

  const select = document.getElementById('animalFilter');
  Object.keys(animalsData).sort().forEach(id => {
    animalsData[id].sort((a, b) => a.parsedDate - b.parsedDate);
    latestRecords[id] = animalsData[id][animalsData[id].length - 1];
    
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = id;
    select.appendChild(opt);
  });

  updateView('all');
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

function updateView(selectedId) {
  markerLayer.clearLayers();
  trackLayer.clearLayers();
  markersMap = {};
  
  const analyticsPanel = document.getElementById('analyticsPanel');
  
  if (selectedId === 'all') {
    analyticsPanel.style.display = 'none';
    Object.keys(latestRecords).forEach(id => {
      createMarker(latestRecords[id], 'marker-default');
    });
    renderTable(Object.values(latestRecords).sort((a,b) => b.parsedDate - a.parsedDate));
  } else {
    analyticsPanel.style.display = 'block';
    const history = animalsData[selectedId];
    const coords = [];
    
    history.forEach((row, idx) => {
      const isLatest = idx === history.length - 1;
      const m = createMarker(row, isLatest ? 'marker-selected' : 'marker-default');
      coords.push([parseFloat(row.Latitude), parseFloat(row.Longitude)]);
    });

    if (coords.length > 1) {
      L.polyline(coords, {color: '#f1c40f', weight: 3, dashArray: '5, 10'}).addTo(trackLayer);
    }
    
    calculateAnalytics(selectedId, history);
    renderTable([...history].reverse());
  }
  
  const bounds = markerLayer.getBounds();
  if (bounds.isValid()) map.fitBounds(bounds, {padding: [50, 50]});
}

function calculateAnalytics(id, history) {
  document.getElementById('analyticsTitle').innerText = `Movement Analytics — ID ${id}`;
  const first = history[0];
  const latest = history[history.length - 1];
  const prev = history.length > 1 ? history[history.length - 2] : latest;

  const fLat = parseFloat(first.Latitude), fLon = parseFloat(first.Longitude);
  const lLat = parseFloat(latest.Latitude), lLon = parseFloat(latest.Longitude);
  const pLat = parseFloat(prev.Latitude), pLon = parseFloat(prev.Longitude);

  let maxDisp = 0;
  history.forEach(row => {
    const d = haversine(fLat, fLon, parseFloat(row.Latitude), parseFloat(row.Longitude));
    if (d > maxDisp) maxDisp = d;
  });

  document.getElementById('statMax').innerText = maxDisp;
  document.getElementById('statCurrent').innerText = haversine(fLat, fLon, lLat, lLon);
  document.getElementById('statPrev').innerText = haversine(pLat, pLon, lLat, lLon);
}

function createMarker(row, className) {
  const lat = parseFloat(row.Latitude);
  const lon = parseFloat(row.Longitude);
  if (isNaN(lat) || isNaN(lon)) return;

  const icon = L.divIcon({
    className: `animal-marker ${className}`,
    html: `<span>${row['Animal ID']}</span>`,
    iconSize: [24, 24]
  });

  const m = L.marker([lat, lon], {icon: icon});
  
  const popupContent = `
    <div style="font-size:13px; line-height:1.5;">
      <b>ID: ${row['Animal ID']}</b><br>
      <b>Time:</b> ${row.Timestamp}<br>
      <b>Place:</b> ${row.Place}<br>
      <b>Activity:</b> ${row.Activity}<br>
      <b>Signal:</b> ${row['Signal Strength']}<br>
      <b>Remarks:</b> ${row.Remarks || 'None'}
    </div>
  `;

  m.bindPopup(popupContent);
  markerLayer.addLayer(m);
  oms.addMarker(m);
  
  markersMap[`${row['Animal ID']}-${row.Timestamp}`] = m;
  return m;
}

function renderTable(data) {
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row['Animal ID']}</td>
      <td>${row.Timestamp}</td>
      <td>${row.Place}</td>
      <td>${row.Activity}</td>
      <td>${row['Signal Strength']}</td>
      <td>${row.Latitude}</td>
      <td>${row.Longitude}</td>
      <td>${row.Remarks}</td>
    `;
    tr.onclick = () => {
      const m = markersMap[`${row['Animal ID']}-${row.Timestamp}`];
      if (m) {
        map.setView(m.getLatLng(), 16);
        m.openPopup();
      }
    };
    tbody.appendChild(tr);
  });
}

window.onload = init;
</script>
</body>
</html>
