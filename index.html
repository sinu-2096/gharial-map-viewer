```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f6f9;
color:#333;
}

/* HEADER */

header{
height:70px;
background:#2c3e50;
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

header h1{
font-size:20px;
margin:0;
}

.logo-left img{
position:absolute;
left:20px;
max-height:40px;
}

.logo-right img{
position:absolute;
right:20px;
max-height:40px;
}

/* CONTROLS */

.top-panel{
display:flex;
align-items:center;
gap:15px;
padding:10px 20px;
background:white;
border-bottom:1px solid #ddd;
}

select{
padding:6px 10px;
border:1px solid #ccc;
border-radius:4px;
}

.status-dot{
width:8px;
height:8px;
background:#27ae60;
border-radius:50%;
display:inline-block;
margin-right:5px;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.2}
100%{opacity:1}
}

button{
padding:6px 12px;
background:#27ae60;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

/* MAP */

.map-container{
padding:20px;
}

#map{
height:70vh;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* TABLE */

.table-container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2c3e50;
color:white;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f1f1f1;
}

/* UPDATES PANEL */

#updatesPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
transition:0.3s;
padding:20px;
overflow-y:auto;
}

#updatesPanel.open{
right:0;
}

.update-item{
margin-bottom:15px;
border-left:3px solid #27ae60;
padding-left:10px;
}

</style>
</head>

<body>

<header>

<div class="logo-left">
<img src="unnamed.png">
</div>

<h1>Pali FT Hatchlings Telemetry Dashboard</h1>

<div class="logo-right">
<img src="image.png">
</div>

</header>

<div class="top-panel">

<select id="animalFilter">
<option value="all">All Hatchlings</option>
</select>

<div>
<span class="status-dot"></span>
<span id="statusText">Loading telemetry...</span>
</div>

<button onclick="openUpdates()">Field Updates</button>

</div>

<div class="map-container">
<div id="map"></div>
</div>

<div class="table-container">

<table id="dataTable">

<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
<th>Lat</th>
<th>Lon</th>
<th>Remarks</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div id="updatesPanel">
<h3>Field Updates</h3>
<div id="updatesContent"></div>
</div>

<script>

/* SHEET LINKS */

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-f3JOwQZSlcBmpp4JO_Owut9JogW7KZYfJj5PONOc1TXE73xjvypZ1w6mWvvNzjFTaShiR6oYtzdt/pub?gid=0&single=true&output=csv";

const UPDATES_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-f3JOwQZSlcBmpp4JO_Owut9JogW7KZYfJj5PONOc1TXE73xjvypZ1w6mWvvNzjFTaShiR6oYtzdt/pub?gid=238985281&single=true&output=csv";

/* MAP */

let map=L.map("map").setView([25.84,76.56],13);

L.tileLayer(
"http://mt0.google.com/vt/lyrs=y&x={x}&y={y}&z={z}"
).addTo(map);

let oms=new OverlappingMarkerSpiderfier(map);
let markerLayer=L.layerGroup().addTo(map);

let animals={};

/* LOAD TELEMETRY */

Papa.parse(CSV_URL,{
download:true,
header:true,
complete:function(results){

console.log("Telemetry rows:",results.data);

processData(results.data);

}
});

/* PROCESS DATA */

function processData(rows){

rows.forEach(r=>{

let id=r["Animal ID"];

let lat=parseFloat(r["Latitude"]);
let lon=parseFloat(r["Longitude"]);

if(!id||lat===0||lon===0||isNaN(lat)||isNaN(lon)) return;

if(!animals[id]) animals[id]=[];

animals[id].push(r);

});

populateDropdown();
renderMap();
renderTable();

document.getElementById("statusText").textContent="Telemetry Loaded";

}

/* DROPDOWN */

function populateDropdown(){

let select=document.getElementById("animalFilter");

Object.keys(animals).forEach(id=>{

let opt=document.createElement("option");

opt.value=id;
opt.textContent=id;

select.appendChild(opt);

});

}

/* MAP */

function renderMap(){

markerLayer.clearLayers();

Object.keys(animals).forEach(id=>{

let r=animals[id][0];

let lat=parseFloat(r["Latitude"]);
let lon=parseFloat(r["Longitude"]);

let marker=L.circleMarker([lat,lon],{
radius:7,
color:"#007bff",
fillOpacity:0.8
});

marker.bindPopup(
"<b>ID:</b> "+id+
"<br><b>Place:</b> "+r["Place"]+
"<br><b>Activity:</b> "+r["Activity"]
);

marker.addTo(markerLayer);
oms.addMarker(marker);

});

}

/* TABLE */

function renderTable(){

let tbody=document.querySelector("#dataTable tbody");

tbody.innerHTML="";

Object.keys(animals).forEach(id=>{

let r=animals[id][0];

let signal=r["Signal Strength"] || r["Signal Stength"] || "";

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${id}</td>
<td>${r["Timestamp"]}</td>
<td>${r["Place"]}</td>
<td>${r["Activity"]}</td>
<td>${signal}</td>
<td>${r["Latitude"]}</td>
<td>${r["Longitude"]}</td>
<td>${r["Remarks"]}</td>
`;

tbody.appendChild(tr);

});

}

/* FIELD UPDATES */

function openUpdates(){

let panel=document.getElementById("updatesPanel");

panel.classList.toggle("open");

if(panel.classList.contains("open")){

loadUpdates();

}

}

function loadUpdates(){

Papa.parse(UPDATES_URL,{
download:true,
header:true,
complete:function(results){

let container=document.getElementById("updatesContent");

container.innerHTML="";

results.data.reverse().forEach(r=>{

let div=document.createElement("div");

div.className="update-item";

div.innerHTML=
"<b>"+r["Date"]+"</b><br>"+r["Update"];

container.appendChild(div);

});

}
});

}

</script>

</body>
</html>
```
