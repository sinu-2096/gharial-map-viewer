<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

:root{
--map-height:70vh;
--primary-bg:#f4f6f9;
--header-bg:#2c3e50;
--text-color:#333;
--border-color:#ccc;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--primary-bg);
color:var(--text-color);
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:var(--header-bg);
color:white;
padding:12px 20px;
display:grid;
grid-template-columns:auto auto 1fr;
align-items:center;
gap:12px;
}

header img{
height:42px;
}

header h1{
text-align:center;
font-size:1.5rem;
}

.top-panel{
background:white;
padding:12px 20px;
border-bottom:1px solid var(--border-color);
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.filter-group{
display:flex;
align-items:center;
gap:10px;
}

.filter-group label{
font-weight:bold;
}

.filter-group select{
padding:8px 12px;
border:1px solid var(--border-color);
border-radius:4px;
}

.analytics-panel{
display:none;
background:#fff8dc;
padding:12px 20px;
border-bottom:1px solid #ddd;
font-size:0.95rem;
}

.status-bar{
background:#ecf0f1;
padding:8px 20px;
font-size:0.9rem;
}

.map-container{
height:var(--map-height);
}

#map{
width:100%;
height:100%;
}

.table-container{
padding:20px;
overflow-x:auto;
background:white;
}

.telemetry-table{
width:100%;
border-collapse:collapse;
font-size:0.9rem;
}

.telemetry-table th,
.telemetry-table td{
padding:10px 12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.telemetry-table th{
background:var(--header-bg);
color:white;
position:sticky;
top:0;
z-index:1;
}

.telemetry-table tbody tr:hover{
background:#dce8f5;
cursor:pointer;
}

.animal-marker{
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:12px;
border:2px solid white;
box-shadow:0 0 5px rgba(0,0,0,0.6);
background:#007bff;
}

.marker-dead{
background:#dc3545 !important;
}

.star-marker{
font-size:18px;
}

.field-panel{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:right 0.3s;
overflow:auto;
z-index:999;
}

.field-panel.open{
right:0;
}

.close-btn{
cursor:pointer;
font-weight:bold;
font-size:18px;
}

.field-update{
padding:8px 0;
border-bottom:1px solid #eee;
}

.field-btn{
padding:7px 12px;
background:#2c3e50;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<img src="image.png">
<img src="unnamed.png">
<h1>🐊 Pali FT Hatchlings Telemetry Dashboard</h1>
</header>

<div class="top-panel">

<div class="filter-group">
<label>Select Animal</label>
<select id="animalFilter">
<option value="all">All Animals</option>
</select>
</div>

<button class="field-btn" onclick="toggleFieldPanel()">Field Updates</button>

</div>

<div class="analytics-panel" id="analyticsPanel"></div>

<div class="status-bar" id="statusBar">
Latest Telemetry: loading...
</div>

<div class="map-container">
<div id="map"></div>
</div>

<div class="table-container">
<table class="telemetry-table" id="dataTable">
<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal Strength</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="field-panel" id="fieldPanel">

<div style="display:flex;justify-content:space-between;">
<h3>Field Updates</h3>
<div class="close-btn" onclick="toggleFieldPanel()">✕</div>
</div>

<div id="fieldUpdatesList"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

<script>

const CSV_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0';
const UPDATE_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=238985281';

const MAP_CENTER=[25.84,76.56];
const MAP_ZOOM=13;

const DEAD_IDS=['30','33','34','38','96','64','98'];

let map;
let oms;

let rawData=[];
let animalsData={};
let latestRecords={};
let markers=[];
let markerMapping={};

function init(){
initMap();
loadTelemetry();
loadFieldUpdates();

document.getElementById('animalFilter')
.addEventListener('change',e=>updateDashboard(e.target.value));
}

function initMap(){

map=L.map('map').setView(MAP_CENTER,MAP_ZOOM);

L.tileLayer(
'http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);

oms=new OverlappingMarkerSpiderfier(map);

}

function loadTelemetry(){

Papa.parse(CSV_URL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

rawData=results.data;

processData();
populateDropdown();
updateDashboard('all');
updateStatus();

}
});

}

function loadFieldUpdates(){

Papa.parse(UPDATE_URL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

let rows=results.data;
let container=document.getElementById("fieldUpdatesList");

rows.reverse().forEach(r=>{

if(!r.Date || !r.Update) return;

let div=document.createElement("div");
div.className="field-update";

div.innerHTML="<b>"+r.Date+"</b><br>"+r.Update;

container.appendChild(div);

});

}
});

}

function processData(){

animalsData={};
latestRecords={};

rawData.forEach(row=>{

let id=row['Animal ID'];
if(!id) return;

row.parsedDate=parseDate(row['Timestamp']);

if(!animalsData[id]) animalsData[id]=[];

animalsData[id].push(row);

});

for(let id in animalsData){

animalsData[id].sort((a,b)=>b.parsedDate-a.parsedDate);

latestRecords[id]=animalsData[id][0];

}

}

function parseDate(s){

if(!s) return new Date(0);

let p=s.split(' ');

let d=p[0].split('-');
let t=p[1]?p[1].split(':'):['00','00'];

return new Date(
parseInt(d[2]),
parseInt(d[1])-1,
parseInt(d[0]),
parseInt(t[0]),
parseInt(t[1])
);

}

function populateDropdown(){

let sel=document.getElementById('animalFilter');

Object.keys(animalsData).sort((a,b)=>a-b)
.forEach(id=>{
let o=document.createElement('option');
o.value=id;
o.textContent=id;
sel.appendChild(o);
});

}

function addMarker(record){

let lat=parseFloat(record['Latitude']);
let lng=parseFloat(record['Longitude']);

if(isNaN(lat)||isNaN(lng)) return;

let id=record['Animal ID'];

let cls='animal-marker';

if(DEAD_IDS.includes(id)) cls+=' marker-dead';

let icon=L.divIcon({
className:cls,
html:id,
iconSize:[28,28],
iconAnchor:[14,14]
});

let m=L.marker([lat,lng],{icon}).addTo(map);

m.bindPopup(
"<b>Animal ID:</b> "+record['Animal ID']+
"<br><b>Timestamp:</b> "+record['Timestamp']+
"<br><b>Place:</b> "+record['Place']+
"<br><b>Activity:</b> "+record['Activity']+
"<br><b>Signal Strength:</b> "+(record['Signal Stength']||'')+
"<br><b>Latitude:</b> "+record['Latitude']+
"<br><b>Longitude:</b> "+record['Longitude']+
"<br><b>Remarks:</b> "+(record['Remarks']||'')
);

markers.push(m);
oms.addMarker(m);

markerMapping[id+"_"+record['Timestamp']]=m;

return m;

}

function toggleFieldPanel(){
document.getElementById('fieldPanel').classList.toggle('open');
}

document.addEventListener('DOMContentLoaded',init);

</script>

</body>
</html>
