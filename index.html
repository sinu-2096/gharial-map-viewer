<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

:root{
--map-height:70vh;
--primary-bg:#f4f6f9;
--header-bg:#2c3e50;
--text-color:#333;
--border-color:#ccc;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--primary-bg);
color:var(--text-color);
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:var(--header-bg);
color:white;
padding:12px 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.header-logo{
position:absolute;
left:20px;
display:flex;
align-items:center;
}

.header-logo img{
height:40px;
}

header h1{
font-size:1.5rem;
text-align:center;
}

.top-panel{
background:white;
padding:12px 20px;
border-bottom:1px solid var(--border-color);
display:flex;
align-items:center;
gap:30px;
flex-wrap:wrap;
}

.filter-group{
display:flex;
align-items:center;
gap:10px;
}

.filter-group label{
font-weight:bold;
font-size:1rem;
color:var(--header-bg);
}

.filter-group select{
padding:9px 14px;
border:1px solid var(--border-color);
border-radius:4px;
font-size:1rem;
min-width:160px;
}

.status-box{
font-size:0.95rem;
font-weight:bold;
color:#2c3e50;
}

.updates-btn{
margin-left:auto;
background:#2c3e50;
color:white;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
}

.updates-btn:hover{
background:#1b2733;
}

.map-container{
height:var(--map-height);
}

#map{
width:100%;
height:100%;
}

/* PANELS */

.dashboard-panels{
display:flex;
gap:20px;
padding:15px 20px;
background:white;
border-bottom:1px solid var(--border-color);
flex-wrap:wrap;
}

.panel{
flex:1;
min-width:250px;
background:#fafafa;
border:1px solid #ddd;
border-radius:6px;
padding:12px;
}

.panel h3{
font-size:1rem;
margin-bottom:8px;
color:#2c3e50;
}

.panel ul{
list-style:none;
font-size:0.9rem;
}

.panel li{
margin-bottom:6px;
cursor:pointer;
}

/* FIELD UPDATES MODAL */

#updatesModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

#updatesContent{
background:white;
padding:20px;
border-radius:6px;
max-width:500px;
width:90%;
max-height:70vh;
overflow-y:auto;
}

#updatesContent h2{
margin-bottom:10px;
}

.close-updates{
float:right;
cursor:pointer;
font-weight:bold;
}

/* TABLE */

.table-hint{
font-size:0.85rem;
color:#777;
padding:8px 20px 0 20px;
background:white;
}

.table-container{
padding:20px;
overflow-x:auto;
background:white;
}

.telemetry-table{
width:100%;
border-collapse:collapse;
font-size:0.95rem;
}

.telemetry-table th,
.telemetry-table td{
padding:12px 15px;
text-align:left;
border-bottom:1px solid #ddd;
}

.telemetry-table th{
background-color:var(--header-bg);
color:white;
position:sticky;
top:0;
z-index:1;
font-size:0.95rem;
}

.telemetry-table tbody tr{
cursor:pointer;
transition:background-color 0.15s ease;
}

.telemetry-table tbody tr:hover{
background:#dce8f5;
}

.telemetry-table tbody tr.row-active{
background:#b8d4f0;
outline:2px solid #2980b9;
outline-offset:-2px;
}

.telemetry-table tbody tr.row-hidden{
display:none;
}

/* MARKERS */

.animal-marker{
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:12px;
border:2px solid white;
box-shadow:0 0 5px rgba(0,0,0,0.6);
}

.marker-default{background:#007bff;}
.marker-selected{background:#dc3545;}

/* POPUP */

.custom-popup .leaflet-popup-content{
font-size:14px;
line-height:1.7;
min-width:220px;
}

.custom-popup b{color:#2c3e50;}
.popup-row{margin-bottom:5px;}

</style>
</head>

<body>

<header>
<div class="header-logo">
<img src="image.png">
</div>
<h1>Pali FT Hatchlings Telemetry Dashboard</h1>
</header>

<div class="top-panel">

<div class="filter-group">
<label for="animalFilter">Select Animal ID</label>
<select id="animalFilter">
<option value="all">All Animals</option>
</select>
</div>

<div class="status-box" id="latestUpdate">
Latest Telemetry Update: Loading...
</div>

<button class="updates-btn" id="openUpdates">
Field Updates
</button>

</div>

<div class="dashboard-panels">

<div class="panel">
<h3>Recent Movements (>300 m)</h3>
<ul id="movementList"></ul>
</div>

</div>

<div class="map-container">
<div id="map"></div>
</div>

<p class="table-hint">💡 Click any row to jump to its location on the map</p>

<div class="table-container">
<table class="telemetry-table" id="dataTable">

<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal Strength</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Remarks</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<!-- UPDATES MODAL -->

<div id="updatesModal">

<div id="updatesContent">

<span class="close-updates" id="closeUpdates">✖</span>

<h2>Field Updates</h2>

<ul id="updatesList"></ul>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const CSV_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0';
const UPDATES_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=123456';

const MAP_CENTER=[25.84,76.56];
const MAP_ZOOM=13;
const DEFAULT_ROWS=5;

let map;
let clusterGroup;
let rawData=[];
let animalsData={};
let latestRecords={};
let markerMapping={};

function init(){
initMap();
loadCSVData();
loadUpdates();

document.getElementById('animalFilter')
.addEventListener('change',e=>updateDashboard(e.target.value));

document.getElementById('openUpdates').onclick=()=>{
document.getElementById('updatesModal').style.display='flex';
};

document.getElementById('closeUpdates').onclick=()=>{
document.getElementById('updatesModal').style.display='none';
};
}

function initMap(){

map=L.map('map').setView(MAP_CENTER,MAP_ZOOM);

L.tileLayer(
'http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);

clusterGroup=L.markerClusterGroup({
spiderfyOnMaxZoom:true,
showCoverageOnHover:false
});

map.addLayer(clusterGroup);

}

function loadCSVData(){

Papa.parse(CSV_URL,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

rawData=results.data;

processData();
populateDropdown();
updateLatestStatus();
updateDashboard('all');

}

});

}

function processData(){

animalsData={};
latestRecords={};

rawData.forEach(row=>{

const id=row['Animal ID'];
if(!id)return;

row.parsedDate=parseCustomDate(row['Timestamp']);

if(!animalsData[id])animalsData[id]=[];

animalsData[id].push(row);

});

for(const id in animalsData){

animalsData[id].sort((a,b)=>b.parsedDate-a.parsedDate);

latestRecords[id]=animalsData[id][0];

}

}

function parseCustomDate(dateString){

if(!dateString)return new Date(0);

const parts=dateString.trim().split(' ');
const dateParts=parts[0].split('-');
const timeParts=parts[1]?parts[1].split(':'):['00','00'];

return new Date(
parseInt(dateParts[2]),
parseInt(dateParts[1])-1,
parseInt(dateParts[0]),
parseInt(timeParts[0]),
parseInt(timeParts[1])
);

}

function populateDropdown(){

const select=document.getElementById('animalFilter');

Object.keys(animalsData)
.sort((a,b)=>a-b)
.forEach(id=>{

const option=document.createElement('option');
option.value=id;
option.textContent=id;

select.appendChild(option);

});

}

function updateLatestStatus(){

let latest=null;

rawData.forEach(r=>{

if(!latest || r.parsedDate>latest.parsedDate){
latest=r;
}

});

if(latest){

document.getElementById('latestUpdate').textContent=
"Latest Telemetry Update: "+latest.Timestamp;

}

}

function updateDashboard(selectedId){

renderMap(selectedId);
renderTable(selectedId);
calculateMovements();

}

function renderMap(selectedId){

clusterGroup.clearLayers();
markerMapping={};

const redIds=['30','33','34','38','96','64','98'];

if(selectedId==='all'){

for(const id in latestRecords){

const r=latestRecords[id];
const lat=parseFloat(r.Latitude);
const lng=parseFloat(r.Longitude);

if(isNaN(lat)||isNaN(lng))continue;

const color=redIds.includes(id.toString())
?'marker-selected'
:'marker-default';

const marker=createMarker(r,color);

clusterGroup.addLayer(marker);

markerMapping[id]=marker;

}

}else{

const records=animalsData[selectedId]||[];

for(let i=records.length-1;i>=0;i--){

const r=records[i];

const lat=parseFloat(r.Latitude);
const lng=parseFloat(r.Longitude);

if(isNaN(lat)||isNaN(lng))continue;

const marker=createMarker(r,'marker-selected');

clusterGroup.addLayer(marker);

}

}

}

function createMarker(record,colorClass){

const lat=parseFloat(record.Latitude);
const lng=parseFloat(record.Longitude);

const id=record['Animal ID'];

const icon=L.divIcon({
className:`animal-marker ${colorClass}`,
html:`<span>${id}</span>`,
iconSize:[30,30]
});

const marker=L.marker([lat,lng],{icon});

marker.bindPopup(
`<div class="custom-popup">
<div class="popup-row"><b>Animal ID:</b> ${id}</div>
<div class="popup-row"><b>Last Seen:</b> ${record.Timestamp}</div>
<div class="popup-row"><b>Location:</b> ${record.Place}</div>
<div class="popup-row"><b>Activity:</b> ${record.Activity}</div>
<div class="popup-row"><b>Latitude:</b> ${record.Latitude}</div>
<div class="popup-row"><b>Longitude:</b> ${record.Longitude}</div>
<div class="popup-row"><b>Remarks:</b> ${record.Remarks||''}</div>
</div>`
);

return marker;

}

function calculateMovements(){

const list=document.getElementById('movementList');
list.innerHTML='';

for(const id in animalsData){

const records=animalsData[id];

if(records.length<2)continue;

const latest=records[0];
const prev=records[1];
const first=records[records.length-1];

const d1=haversine(prev,latest);
const d2=haversine(first,latest);

if(d1>300){

const li=document.createElement('li');

li.textContent=`ID ${id} – moved ${Math.round(d1)} m (total ${Math.round(d2)} m)`;

li.onclick=()=>{

const marker=markerMapping[id];
if(marker){
map.setView(marker.getLatLng(),15);
marker.openPopup();
}

};

list.appendChild(li);

}

}

}

function haversine(a,b){

const R=6371000;

const lat1=a.Latitude*Math.PI/180;
const lat2=b.Latitude*Math.PI/180;

const dLat=(b.Latitude-a.Latitude)*Math.PI/180;
const dLon=(b.Longitude-a.Longitude)*Math.PI/180;

const x=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1)*Math.cos(lat2)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

return R*c;

}

function renderTable(selectedId){

const tbody=document.querySelector('#dataTable tbody');
tbody.innerHTML='';

let tableData=[];

if(selectedId==='all'){
tableData=Object.values(latestRecords);
}else{
tableData=animalsData[selectedId];
}

tableData.forEach(row=>{

const tr=document.createElement('tr');

tr.innerHTML=`
<td>${row['Animal ID']}</td>
<td>${row.Timestamp}</td>
<td>${row.Place}</td>
<td>${row.Activity}</td>
<td>${row['Signal Strength']||''}</td>
<td>${row.Latitude}</td>
<td>${row.Longitude}</td>
<td>${row.Remarks||''}</td>
`;

tr.onclick=()=>{

const marker=markerMapping[row['Animal ID']];
if(marker){
map.setView(marker.getLatLng(),15);
marker.openPopup();
}

};

tbody.appendChild(tr);

});

}

function loadUpdates(){

Papa.parse(UPDATES_URL,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

const updates=results.data;

const list=document.getElementById('updatesList');

updates.forEach(u=>{

const li=document.createElement('li');
li.textContent=`${u.Date} — ${u.Update}`;
list.appendChild(li);

});

}

});

}

document.addEventListener('DOMContentLoaded',init);

</script>

</body>
</html>
